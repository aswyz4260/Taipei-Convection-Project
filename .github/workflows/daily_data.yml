name: Auto-Fetch Afternoon Convection Data

on:
  # ------------------------------------------------------
  # 1. 定時執行排程 (台灣時間 = UTC + 8 小時)
  # ------------------------------------------------------
  schedule:
    - cron: '37 11 * * *'  # 每天台灣時間 19:37 (UTC 11:37) -> 處理「當日」個案
    - cron: '21 16 * * *'  # 每天台灣時間 00:21 (UTC 16:21) -> 處理「昨日」補圖

  # ------------------------------------------------------
  # 2. 手動觸發 (判定模式與強行打包模式)
  # ------------------------------------------------------
  workflow_dispatch:
    inputs:
      target_date:
        description: '請輸入要處理的個案日期 (格式: yyyymmdd，例如: 20260616)'
        required: true
        default: 'yyyymmdd'
      run_mode:
        description: '選擇執行模式'
        required: true
        default: 'run_triggered'
        type: choice
        options:
          - 'run_triggered'
          - 'force_download'

# 3. 並發限制（同時間只能跑一個任務，後來的會自動排隊，避免並行衝突）
concurrency:
  group: cwa-data-pipeline
  cancel-in-progress: false  # 設定為 false，代表後來的任務不會把前面的任務踢掉

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 1. 複製雲端專案程式碼
        uses: actions/checkout@v4

      - name: 2. 安裝 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安裝必要套件
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy Pillow

      - name: 4. 接收目標日期參數
        id: date-env
        run: |
          echo "SKIP_RUN=false" >> $GITHUB_ENV
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # A. 手動模式：直接吃輸入的日期
            echo "RUN_DATE=${{ github.event.inputs.target_date }}" >> $GITHUB_ENV
            echo "RUN_MODE=${{ github.event.inputs.run_mode }}" >> $GITHUB_ENV
            
          else
            # B. 定時器模式：改用精準的觸發事件時間判斷
            TRIGGER_CRON="${{ github.event.schedule }}"
            echo "目前定時器觸發源：$TRIGGER_CRON"
            
            if [ "$TRIGGER_CRON" = "21 16 * * *" ]; then
              # 凌晨 00:21 補圖 (抓取昨天的日期)
              TW_YESTERDAY=$(date -d "+8 hours -1 day" +"%Y%m%d")
              echo "跨日定時器啟動，目標為昨日個案：$TW_YESTERDAY"
              
              if [ -d "stn_archives/$TW_YESTERDAY" ]; then
                echo "昨日下午資料夾存在，啟動強制補圖。"
                echo "RUN_DATE=$TW_YESTERDAY" >> $GITHUB_ENV
                echo "RUN_MODE=force_download" >> $GITHUB_ENV
              else
                echo "昨日下午未達指標，不執行補圖。"
                echo "SKIP_RUN=true" >> $GITHUB_ENV
              fi
              
            else
              # 19:37 常規檢測：
              RAW_HOUR=$(date -d "+8 hours" +%H)
              CURRENT_HOUR=$(echo "$RAW_HOUR" | sed 's/^0//')
              # 萬一剛好是 00 點，經 sed 去零後會變成空字串，補回 0
              [ -z "$CURRENT_HOUR" ] && CURRENT_HOUR=0
              
              echo "當前計算小時：$CURRENT_HOUR"
              
              if [ $CURRENT_HOUR -lt 19 ]; then
                TW_TODAY=$(date -d "+8 hours -1 day" +"%Y%m%d")
                echo "警告：偵測到當前小時為 $CURRENT_HOUR，檢測發生跨日延遲，自動回退日期至：$TW_TODAY"
              else
                TW_TODAY=$(date -d "+8 hours" +"%Y%m%d")
                echo "常規檢測順利在當日執行（當前小時：$CURRENT_HOUR），鎖定今日日期：$TW_TODAY"
              fi
              
              echo "RUN_DATE=$TW_TODAY" >> $GITHUB_ENV
              echo "RUN_MODE=run_triggered" >> $GITHUB_ENV
            fi
          fi

      # ------------------------------------------------------
      # 模式 A：雷達指標判定
      # ------------------------------------------------------
      - name: 📡 [模式 A] 啟動雷達指標判定
        if: ${{ env.SKIP_RUN != 'true' && env.RUN_MODE == 'run_triggered' }}
        run: |
          python triggered.py ${{ env.RUN_DATE }}

      # ------------------------------------------------------
      # 圖片下載
      # ------------------------------------------------------
      - name: ⚡️ [模式 B-1] 雷達/閃電/地面
        if: ${{ env.SKIP_RUN != 'true' && success() }}
        run: |
          python fetch_pillow_fig.py ${{ env.RUN_DATE }}

      - name: 📊 [模式 B-2] 觀測站排行 JSON
        if: ${{ env.SKIP_RUN != 'true' && success() }}
        continue-on-error: true
        run: |
          python fetch_stn_rank.py ${{ env.RUN_DATE }}

      - name: ☁️ [模式 B-3] 綜觀天氣圖/熱力探空
        if: ${{ env.SKIP_RUN != 'true' && success() }}
        run: |
          python fetch_cwa_fig.py ${{ env.RUN_DATE }}

      # -------------------------------------------------------
      - name: 自動 Commit 封存
        if: ${{ env.SKIP_RUN != 'true' && success() }}
        run: |
          # 先行拉取防衝突（以 GitHub 雲端為主）
          git pull origin main -X theirs || true
          
          git config --local user.email "action@github.com"
          git config --local user.name "CWA-Data-Bot"
          git add radar_archives/ sfc_archives/ stn_archives/ cwaFig_archives/
          git commit -m "Download Complete! [Date: ${{ env.RUN_DATE }}] [Mode: ${{ env.RUN_MODE }}]" || exit 0
          git push
