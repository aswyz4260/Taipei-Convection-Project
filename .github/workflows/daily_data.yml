name: 午後對流個案圖資自動抓取與儲存

on:
  # ------------------------------------------------------
  # ⚙️ 1. 每天 18:30 定時執行 (台灣時間 18:30 = UTC 10:30)
  # ------------------------------------------------------
  schedule:
    - cron: '30 10 * * *'

  # ------------------------------------------------------
  # 🕹️ 2 & 3. 手動觸發分流控制器 (支援判定模式與強行打包模式)
  # ------------------------------------------------------
  workflow_dispatch:
    inputs:
      target_date:
        description: '請輸入要處理的個案日期 (格式: yyyymmdd，例如: 20260614)'
        required: true
        default: '20260615'
      run_mode:
        description: '選擇執行模式'
        required: true
        default: 'run_triggered'
        type: choice
        options:
          - 'run_triggered'  # 🧠 模式 A：執行 triggered.py（滿足雷達指標才打包）
          - 'force_download' # 🪓 模式 B：強行打包圖資（繞過指標，直接執行3大工廠）

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 複製雲端專案程式碼
        uses: actions/checkout@v4

      - name: 2. 安裝 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安裝必要套件
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas numpy Pillow

      - name: 4. 智慧解析與接收目標日期參數
        id: date-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RUN_DATE=${{ github.event.inputs.target_date }}" >> $GITHUB_ENV
            echo "RUN_MODE=${{ github.event.inputs.run_mode }}" >> $GITHUB_ENV
          else
            # 定時任務預設：抓昨天，且必須執行 triggered.py 科學指標判定
            echo "RUN_DATE=$(date -d 'yesterday' +'%Y%m%d')" >> $GITHUB_ENV
            echo "RUN_MODE=run_triggered" >> $GITHUB_ENV
          fi

      # ------------------------------------------------------
      # 🎯 訴求 1 & 2：執行 triggered.py 進行雷達格點空間指標判定
      # ------------------------------------------------------
      - name: ⛈️ [模式 A] 啟動雷達指標判定與工廠連鎖 (定時或手動指定)
        if: env.RUN_MODE == 'run_triggered'
        run: |
          python triggered.py ${{ env.RUN_DATE }}

      # ------------------------------------------------------
      # 🎯 訴求 3：手動輸入日期強行打包圖片 (繞過 triggered.py 的卡關限制)
      # ------------------------------------------------------
      - name: 🏭 [模式 B-1] 雷達/閃電/地面中尺度)
        if: success() 
        run: |
          python fetch_pillow_fig.py ${{ env.RUN_DATE }}

      - name: 📊 [模式 B-2] 觀測站排行 JSON)
        if: success()
        continue-on-error: true
        run: |
          python fetch_stn_rank.py ${{ env.RUN_DATE }}

      - name: ☁️ [模式 B-3] 綜觀天氣圖/熱力探空)
        if: success()
        run: |
          python fetch_cwa_fig.py ${{ env.RUN_DATE }}

      # ------------------------------------------------------
      # 💾 終點站：圖資與數據自動 Commit 封存回倉庫
      # ------------------------------------------------------
      - name: 🚀 將收割之圖資與數據自動 Commit 封存回倉庫
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "CWA-Data-Bot"
          
          # 把三大工廠跟測站排行、環境牆的所有新資料庫夾 add 進來
          git add radar_archives/ sfc_archives/ stn_archives/ cwaFig_archives/
          
          git commit -m "自動化封存個案圖資成果 [Date: ${{ env.RUN_DATE }}] [Mode: ${{ env.RUN_MODE }}]" || exit 0
          git push