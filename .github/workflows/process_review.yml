name: 自動整理個案報告表單回應

on:
  issues:
    types: [opened, edited]

jobs:
  process-review:
    if: contains(github.event.issue.title, '[個案審查]')
    runs-on: ubuntu-latest
    steps:
      - name: 複製雲端專案程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 執行大氣表單解析
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python parse_review.py

      - name: 自動將解析好的 JSON 報告推回倉庫
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add sfc_archives/
          # 防止研究員只是微調內容導致 commit 失敗
          git commit -m "Auto-update case review summary from Issue #${{ github.event.issue.number }}" || exit 0
          git push