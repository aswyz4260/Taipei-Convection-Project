name: Daily CWA QPF Images Scraper

on:
  schedule:
    # 提前 15 分鐘進場排隊
    - cron: '49 2 * * *'  # 10:49 AM (UTC+8)
  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get_cwa_images:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 複製專案原始碼 (Checkout)
      uses: actions/checkout@v4

    - name: 2. 設定 Python 3.10 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安裝必要網路套件 (requests)
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 4. 執行 Python 智能守門與抓取腳本
      env:
        TZ: 'Asia/Taipei'
      run: python fetch_qpf_fig.py

    - name: 5. 自動將新下載的預報圖 Commit 並 Push 回倉庫
      env:
        TZ: 'Asia/Taipei'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        git add ./qpf_images/*
        
        # 檢查是否有新圖片檔案變更，有變更才執行 commit
        if ! git diff-index --quiet HEAD; then
          git commit -m "自動備份 $(date +'%Y-%m-%d') 11:30 定量降水預報圖 [6h+12h]"
          git push
        else
          echo "偵測結果：今日圖片無變更，跳過 Commit。"
        fi
