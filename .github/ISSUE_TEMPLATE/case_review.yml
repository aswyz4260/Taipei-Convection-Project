name: 📝 個案報告人工紀錄表單
description: 供研究員填寫午後對流個案的綜觀環境描述與關鍵圖資勾選
title: "[個案審查]-YYYY-MM-DD"
labels: ["case-review"]
body:
  - type: markdown
    attributes:
      value: |
        ### ⛈️ 北台灣午後對流個案科學審查系統
        請研究員根據當日圖資，詳細填寫物理機制描述。未勾選的項目在最終成果中將會自動隱藏。

  - type: input
      id: case-date
      attributes:
        label: 📅 輸入審查個案日期 (格式：YYYY-MM-DD)
        description: 請輸入您正在審查的個案日期（例如：2026-06-15）。請務必與 Issue 標題中的日期完全一致，否則雲端解析器會找不到對應資料夾！
        placeholder: "yyyy-mm-dd"
      validations:
        required: true

  - type: markdown
    attributes:
      value: "### 1. 當天綜觀天氣場配置（有勾選才顯示描述）"

  - type: checkboxes
    id: synoptic-check
    attributes:
      label: 綜觀圖資確認
      description: 請勾選欲納入報告的綜觀天氣圖
      options:
        - label: 地面天氣圖
        - label: 850hPa分析圖
        - label: 500hPa分析圖

  - type: textarea
    id: sfc-chart-desc
    attributes:
      label: 📝 地面天氣圖描述
      placeholder: 如果有勾選地面圖，請在此輸入當天地面低壓、鋒面或海風前線的位置與影響...

  - type: textarea
    id: h850-chart-desc
    attributes:
      label: 📝 850hPa圖描述
      placeholder: 如果有勾選850hPa，請在此輸入低空水氣輸送、西南氣流或輻合線特徵...

  - type: textarea
    id: h500-chart-desc
    attributes:
      label: 📝 500hPa圖描述
      placeholder: 如果有勾選500hPa，請在此輸入高空槽線位置、太平洋高壓邊緣脊線特徵...

  - type: markdown
    attributes:
      value: "### 2. 當天熱動力環境（有勾選才顯示描述）"

  - type: checkboxes
    id: thermodynamic-check
    attributes:
      label: 探空圖資確認
      description: 請勾選欲納入報告的探空測站
      options:
        - label: 台北探空 (46692)
        - label: 彭佳嶼探空 (46695)

  - type: textarea
    id: skewt-taipei-desc
    attributes:
      label: 📝 台北探空描述
      placeholder: 請描述台北站 CAPE、CIN、K Index、Pwat 或逆溫層等熱力參數演變...

  - type: textarea
    id: skewt-pengjia-desc
    attributes:
      label: 📝 彭佳嶼探空描述
      placeholder: 請描述彭佳嶼站（海上對流上游環境）或藉以補充說明大環境的熱力結構...

  - type: markdown
    attributes:
      value: "### 3. 當天的降雨與風場逐時分布變化（09-15 每半小時一張圖）"

  - type: dropdown
    id: rain-wind-times
    attributes:
      label: 🌧️ 選擇欲記錄/留存的雨量風向圖時間點 (可多選)
      multiple: true
      options:
        - "09:00"
        - "09:30"
        - "10:00"
        - "10:30"
        - "11:00"
        - "11:30"
        - "12:00"
        - "12:30"
        - "13:00"
        - "13:30"
        - "14:00"
        - "14:30"
        - "15:00"

  - type: textarea
    id: rain-wind-summary
    attributes:
      label: 📝 降雨與風場逐時變化總結描述
      placeholder: 請描述 09-15 時段降雨核心如何擴展、海風如何與局地環流輻合...
    validations:
      required: true

  - type: markdown
    attributes:
      value: "### 4. 當天的溫度逐時分布變化（09-15 每小時一張圖）"

  - type: dropdown
    id: temp-wind-times
    attributes:
      label: 🌡️ 選擇欲記錄/留存的溫度風向圖時間點 (可多選)
      multiple: true
      options:
        - "09:00"
        - "10:00"
        - "11:00"
        - "12:00"
        - "13:00"
        - "14:00"
        - "15:00"

  - type: textarea
    id: temp-wind-summary
    attributes:
      label: 📝 溫度逐時變化總結描述
      placeholder: 請盡量描述都市熱島、盆地高溫累積，以及降雨發生後的局地冷池（Cold Pool）降溫...
    validations:
      required: true

  - type: markdown
    attributes:
      value: "### 5. 對流發展過程與降雨時空分布影響（10-18 每 10 分鐘一張圖）"

  - type: dropdown
    id: radar-lgt-times
    attributes:
      label: 📡 選擇欲記錄/留存的雷達與落雷關鍵時間點 (可多選)
      multiple: true
      options:
        - "10:00"
        - "10:10"
        - "10:20"
        - "10:30"
        - "10:40"
        - "10:50"
        - "11:00"
        - "11:10"
        - "11:20"
        - "11:30"
        - "11:40"
        - "11:50"
        - "12:00"
        - "12:10"
        - "12:20"
        - "12:30"
        - "12:40"
        - "12:50"
        - "13:00"
        - "13:10"
        - "13:20"
        - "13:30"
        - "13:40"
        - "13:50"
        - "14:00"
        - "14:10"
        - "14:20"
        - "14:30"
        - "14:40"
        - "14:50"
        - "15:00"
        - "15:10"
        - "15:20"
        - "15:30"
        - "15:40"
        - "15:50"
        - "16:00"
        - "16:10"
        - "16:20"
        - "16:30"
        - "16:40"
        - "16:50"
        - "17:00"
        - "17:10"
        - "17:20"
        - "17:30"
        - "17:40"
        - "17:50"
        - "18:00"

  - type: textarea
    id: radar-lgt-summary
    attributes:
      label: 📝 雷達回波與閃電落雷演變總結描述
      placeholder: 請描述對流胞最初在哪裡觸發、閃電頻率爆發階段，以及隨後的發展、移動...
    validations:
      required: true